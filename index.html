<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Nhân Vật Của Tôi</title>
    <!-- Nhúng thư viện Tailwind CSS và FontAwesome làm giao diện -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        // Sửa lỗi nhận diện ban đầu: Kiểm tra chính xác trạng thái đã lưu
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-pink-50 dark:bg-[#2d2d30] min-h-screen text-gray-800 dark:text-gray-200 font-sans p-6 transition-colors duration-300">

    <!-- NÚT CHUYỂN ĐỔI SÁNG / TỐI -->
    <div class="max-w-4xl mx-auto flex justify-end mb-6">
        <button id="theme-toggle" class="cursor-pointer bg-white dark:bg-gray-800 text-gray-700 dark:text-yellow-400 font-medium px-4 py-2 rounded-full shadow-sm border border-pink-100 dark:border-gray-700 hover:scale-105 transition-all text-sm flex items-center gap-2">
            <span id="theme-icon">☀️</span> <span id="theme-text">Chế độ Sáng</span>
        </button>
    </div>

    <!-- KHU VỰC CHỨA CÁC KHUNG NHÂN VẬT -->
    <main id="char-container" class="max-w-4xl mx-auto space-y-4 pb-16">
        <!-- JavaScript tự động vẽ các khung và ô nhập văn bản vào đây -->
    </main>

    <footer class="text-center text-xs text-gray-400 dark:text-gray-500 my-10">
        © 2026 - Bản sửa lỗi Chế độ Sáng/Tối
    </footer>

    <script>
        // 1. NƠI CẤU HÌNH DỮ LIỆU
        const charData = [
            {
                id: "ashton",
                name: "Ashton Calloway",
                subText: "Hiện đại | FWB · yearning · off-campus inspired",
                ggaiLink: "https://link-ggai-cua-ashton.com"
            },
            {
                id: "nghienle",
                name: "Khương Nghiên Lễ",
                subText: "Hiện đại | côn trùng real · em trai chị gái",
                ggaiLink: "https://link-ggai-cua-nghienle.com"
            },
            {
                id: "phidam",
                name: "Khương Phi Đàm",
                subText: "Học đường | Academic rivals · vô sỉ · mặt dày",
                ggaiLink: "https://link-ggai-cua-phidam.com"
            },
            {
                id: "vietlam",
                name: "Khương Viết Lâm",
                subText: "VN xưa | Hài · trinh thám · Nam Định",
                ggaiLink: "https://link-ggai-cua-vietlam.com"
            }
        ];

        // 2. HÀM VẼ GIAO DIỆN
        const container = document.getElementById('char-container');

        function renderChars() {
            container.innerHTML = '';
            
            charData.forEach(char => {
                const wrapper = document.createElement('div');
                wrapper.className = "flex flex-col space-y-2";

                wrapper.innerHTML = `
                    <div class="bg-white dark:bg-[#1e1e1f] rounded-2xl border border-pink-100 dark:border-[#333334] p-5 shadow-sm flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                        <div class="space-y-1">
                            <h3 class="text-xl font-bold text-gray-800 dark:text-white">${char.name}</h3>
                            <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">${char.subText}</p>
                        </div>
                        
                        <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
                            <a href="${char.ggaiLink}" target="_blank" class="bg-[#db5a6b] text-white font-bold px-5 py-2.5 rounded-xl text-sm hover:opacity-90 transition flex items-center gap-1.5 justify-center w-1/2 sm:w-auto">
                                <i class="fa-solid fa-user-lock text-xs"></i> GGAI
                            </a>
                            <button onclick="toggleStory('${char.id}')" class="cursor-pointer bg-gray-50 dark:bg-[#2d2d30] text-gray-700 dark:text-gray-200 font-semibold px-5 py-2.5 rounded-xl text-sm border border-gray-200 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 transition flex items-center gap-1.5 justify-center w-1/2 sm:w-auto">
                                <i class="fa-solid fa-book-open text-xs"></i> Story
                            </button>
                        </div>
                    </div>

                    <div id="story-area-${char.id}" class="hidden transition-all duration-300">
                        <textarea 
                            id="text-${char.id}"
                            placeholder="Dán văn bản truyện hoặc ghi chú của ${char.name} vào đây..." 
                            class="w-full h-48 p-4 bg-white dark:bg-[#1e1e1f] border border-pink-100 dark:border-[#333334] rounded-2xl text-sm shadow-inner focus:outline-none focus:ring-2 focus:ring-pink-300 dark:focus:ring-pink-800 text-gray-700 dark:text-gray-300 resize-y"
                        ></textarea>
                    </div>
                `;
                container.appendChild(wrapper);
                
                const savedText = localStorage.getItem(`story-text-${char.id}`);
                if (savedText) {
                    document.getElementById(`text-${char.id}`).value = savedText;
                }

                document.getElementById(`text-${char.id}`).addEventListener('input', (e) => {
                    localStorage.setItem(`story-text-${char.id}`, e.target.value);
                });
            });
        }

        function toggleStory(id) {
            const storyDiv = document.getElementById(`story-area-${id}`);
            storyDiv.classList.toggle('hidden');
        }

        // 3. LOGIC ĐỔI CHẾ ĐỘ SÁNG / TỐI (Đã sửa lỗi đồng bộ class)
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');

        function updateToggleBtn() {
            if (document.documentElement.classList.contains('dark')) {
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Chế độ Tối';
            } else {
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Chế độ Sáng';
            }
        }

        // Chạy đồng bộ ngay khi load trang
        updateToggleBtn();

        themeToggleBtn.addEventListener('click', () => {
            // Thực hiện đảo ngược class dark rõ ràng hơn
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            updateToggleBtn();
        });

        // Khởi tạo danh sách nhân vật
        renderChars();
    </script>
</body>
</html>
