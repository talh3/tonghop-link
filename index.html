<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Nhân Vật Của Tôi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-pink-50 dark:bg-[#2d2d30] min-h-screen text-gray-800 dark:text-gray-200 font-sans p-6 transition-colors duration-300">

    <div class="max-w-4xl mx-auto mb-6 space-y-4">
        <!-- Hàng 1: Tiêu đề & Nút Sáng/Tối -->
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold text-pink-600 dark:text-pink-400">Thư Viện Nhân Vật</h1>
            <button id="theme-toggle" class="cursor-pointer bg-white dark:bg-[#1e1e1f] text-gray-700 dark:text-yellow-400 font-medium px-4 py-2 rounded-full shadow-sm border border-pink-100 dark:border-[#333334] hover:scale-105 transition-all text-sm flex items-center gap-2">
                <span id="theme-icon">☀️</span> <span id="theme-text">Chế độ Sáng</span>
            </button>
        </div>

        <!-- Hàng 2: Bộ lọc Tác giả & Bảng chữ cái -->
        <div class="bg-white dark:bg-[#1e1e1f] p-4 rounded-2xl border border-pink-100 dark:border-[#333334] shadow-sm space-y-4">
            
            <!-- Lọc theo tác giả -->
            <div class="flex flex-col sm:flex-row sm:items-center gap-3">
                <label class="text-sm font-semibold text-gray-600 dark:text-gray-300 shrink-0"><i class="fa-solid fa-pen-nib mr-1"></i> Tác giả:</label>
                <select id="author-select" onchange="filterByAuthor(this.value)" class="w-full sm:w-auto bg-pink-50 dark:bg-[#2d2d30] border border-pink-200 dark:border-[#524a4d] text-gray-700 dark:text-gray-200 text-sm rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-pink-300 transition cursor-pointer">
                    <option value="">Tất cả Tác giả</option>
                    <!-- JavaScript sẽ tự động điền tên các tác giả vào đây -->
                </select>
            </div>

            <!-- Lọc theo chữ cái A-Z -->
            <div class="flex items-center gap-2 overflow-x-auto pb-2 scrollbar-hide" id="alphabet-container">
                <span class="text-sm font-semibold text-gray-600 dark:text-gray-300 shrink-0 mr-1"><i class="fa-solid fa-font mr-1"></i> Chữ cái:</span>
                <button onclick="filterByLetter('')" id="btn-letter-all" class="shrink-0 px-3 py-1 rounded-lg text-sm font-medium transition-colors bg-pink-500 text-white shadow-sm">Tất cả</button>
                <!-- JavaScript sẽ tự tạo các nút A-Z vào đây -->
            </div>
        </div>

        <!-- Hàng 3: Hiển thị trạng thái đang lọc (Tag) -->
        <div id="filter-status" class="hidden flex-wrap items-center gap-2 bg-white dark:bg-[#1e1e1f] p-3 rounded-xl border border-pink-100 dark:border-[#333334] shadow-sm">
            <span class="text-sm text-gray-500 dark:text-gray-400">Đang lọc tag:</span>
            <span id="current-filter-tag" class="bg-pink-100 dark:bg-pink-900/30 text-pink-600 dark:text-pink-300 px-3 py-1 rounded-lg text-sm font-bold border border-pink-200 dark:border-pink-800/50"></span>
            <button onclick="filterByTag('')" class="text-xs text-red-400 hover:text-red-600 transition underline cursor-pointer ml-2"><i class="fa-solid fa-xmark"></i> Xóa tag</button>
        </div>
    </div>

    <!-- KHU VỰC CHỨA CÁC KHUNG NHÂN VẬT -->
    <main id="char-container" class="max-w-4xl mx-auto space-y-4 pb-16">
        <!-- Javascript vẽ khung -->
    </main>

    <footer class="text-center text-xs text-gray-400 dark:text-gray-500 my-10">
        © 2026 - Thư viện tổng hợp đa tác giả
    </footer>

    <script>
        // 1. NƠI NHẬP DỮ LIỆU
        // THÊM: Thuộc tính "author" để ghi tên tác giả.
        let charData = [
            {
                name: "Khương Phi Đàm",
                author: "Cổ Thị",
                category: "Học đường",
                tags: ["Academic rivals", "vô sỉ", "mặt dày"],
                ggaiLink: "https://link-ggai-cua-phidam.com",
                storyLink: "https://rentry.org/link-truyen-phi-dam"
            },
            {
                name: "Ashton Calloway",
                author: "Mẹ Gà",
                category: "Hiện đại",
                tags: ["FWB", "yearning", "off-campus inspired"],
                ggaiLink: "https://aistudio.google.com/app/prompts/1VBfM5aGrPGW4t8HNRAX4SJEsZKmdOpYj",
                storyLink: "https://rentry.co/ashton_ta"
            },
            {
                name: "Khương Viết Lâm",
                author: "Cổ Thị",
                category: "VN xưa",
                tags: ["Hài", "trinh thám", "Nam Định"],
                ggaiLink: "https://link-ggai-cua-vietlam.com",
                storyLink: "https://rentry.org/link-truyen-viet-lam"
            },
            {
                name: "Ánh Dương",
                author: "Tác Giả C",
                category: "Hiện đại",
                tags: ["chữa lành", "thanh xuân"],
                ggaiLink: "https://link-ggai-cua-anhduong.com",
                storyLink: "https://rentry.org/link-truyen-anh-duong"
            }
        ];

        // 2. TỰ ĐỘNG SẮP XẾP THEO BẢNG CHỮ CÁI (A-Z)
        charData.sort((a, b) => a.name.localeCompare(b.name, 'vi'));

        // CÁC BIẾN LƯU TRẠNG THÁI LỌC
        let currentTag = "";
        let currentAuthor = "";
        let currentLetter = "";

        // 3. KHỞI TẠO GIAO DIỆN BỘ LỌC
        function initFilters() {
            // Khởi tạo danh sách tác giả tự động
            const authors = [...new Set(charData.map(char => char.author))].sort((a, b) => a.localeCompare(b, 'vi'));
            const authorSelect = document.getElementById('author-select');
            authors.forEach(author => {
                let option = document.createElement('option');
                option.value = author;
                option.textContent = author;
                authorSelect.appendChild(option);
            });

            // Khởi tạo các nút A-Z
            const alphabetContainer = document.getElementById('alphabet-container');
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            alphabet.forEach(letter => {
                let btn = document.createElement('button');
                btn.textContent = letter;
                btn.id = `btn-letter-${letter}`;
                btn.className = "letter-btn shrink-0 px-3 py-1 rounded-lg text-sm font-medium transition-colors bg-gray-100 dark:bg-[#3d3d40] text-gray-600 dark:text-gray-300 hover:bg-pink-100 dark:hover:bg-pink-900/40";
                btn.onclick = () => filterByLetter(letter);
                alphabetContainer.appendChild(btn);
            });
        }

        // Helper: Lấy chữ cái đầu tiên (Bỏ dấu tiếng Việt, vd: Á -> A)
        function getFirstLetter(name) {
            return name.normalize("NFD").replace(/[\u0300-\u036f]/g, "").charAt(0).toUpperCase();
        }

        // 4. HÀM VẼ GIAO DIỆN KẾT HỢP CÁC BỘ LỌC
        const container = document.getElementById('char-container');

        function renderChars() {
            container.innerHTML = '';
            
            // Lọc dữ liệu qua cả 3 điều kiện
            const dataToRender = charData.filter(char => {
                const matchTag = currentTag ? char.tags.includes(currentTag) : true;
                const matchAuthor = currentAuthor ? char.author === currentAuthor : true;
                const matchLetter = currentLetter ? getFirstLetter(char.name) === currentLetter : true;
                
                return matchTag && matchAuthor && matchLetter;
            });

            if (dataToRender.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 mt-10">Không tìm thấy nhân vật nào phù hợp với bộ lọc hiện tại.</p>`;
                return;
            }
            
            dataToRender.forEach(char => {
                const wrapper = document.createElement('div');
                
                const tagsHTML = char.tags.map(tag => `
                    <button onclick="filterByTag('${tag}')" class="bg-transparent border border-gray-300 dark:border-[#524a4d] text-pink-600 dark:text-[#e4aeb6] px-2.5 py-1 rounded-lg text-xs font-medium cursor-pointer hover:bg-pink-50 dark:hover:bg-[#4a3b3e] transition-colors focus:outline-none">
                        ${tag}
                    </button>
                `).join('');

                wrapper.innerHTML = `
                    <div class="bg-white dark:bg-[#1e1e1f] rounded-2xl border border-pink-100 dark:border-[#333334] p-5 shadow-sm flex flex-col sm:flex-row items-start sm:items-center justify-between gap-5 transition-all hover:shadow-md relative overflow-hidden">
                        
                        <!-- Cột Trái -->
                        <div class="space-y-2.5 flex-1 w-full">
                            <div class="flex items-center gap-2">
                                <h3 class="text-xl font-bold text-gray-800 dark:text-white">${char.name}</h3>
                                <span class="bg-gray-100 dark:bg-[#2d2d30] text-gray-500 dark:text-gray-400 text-xs px-2 py-1 rounded-md border border-gray-200 dark:border-gray-700"><i class="fa-solid fa-pen-nib text-[10px]"></i> ${char.author}</span>
                            </div>
                            
                            <div class="flex flex-wrap items-center gap-2">
                                <span class="text-sm text-gray-500 dark:text-gray-400 font-medium mr-1">${char.category} |</span>
                                ${tagsHTML}
                            </div>
                        </div>
                        
                        <!-- Cột Phải -->
                        <div class="flex items-center gap-3 w-full sm:w-auto justify-end shrink-0">
                            <a href="${char.ggaiLink}" target="_blank" class="bg-[#db5a6b] text-white font-bold px-5 py-2.5 rounded-xl text-sm hover:opacity-90 transition flex items-center gap-1.5 justify-center w-1/2 sm:w-auto shadow-sm">
                                <i class="fa-solid fa-user-lock text-xs"></i> GGAI
                            </a>
                            <a href="${char.storyLink}" target="_blank" class="bg-gray-50 dark:bg-[#2d2d30] text-gray-700 dark:text-gray-200 font-semibold px-5 py-2.5 rounded-xl text-sm border border-gray-200 dark:border-[#524a4d] hover:bg-gray-100 dark:hover:bg-[#3d3d40] transition flex items-center gap-1.5 justify-center w-1/2 sm:w-auto shadow-sm">
                                <i class="fa-solid fa-book-open text-xs"></i> Story
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(wrapper);
            });
        }

        // CÁC HÀM CẬP NHẬT BỘ LỌC
        function filterByAuthor(author) {
            currentAuthor = author;
            renderChars();
        }

        function filterByLetter(letter) {
            currentLetter = letter;
            
            // Cập nhật giao diện nút bấm
            document.querySelectorAll('.letter-btn, #btn-letter-all').forEach(btn => {
                btn.className = "letter-btn shrink-0 px-3 py-1 rounded-lg text-sm font-medium transition-colors bg-gray-100 dark:bg-[#3d3d40] text-gray-600 dark:text-gray-300 hover:bg-pink-100 dark:hover:bg-pink-900/40";
            });
            
            const activeBtn = letter === "" ? document.getElementById('btn-letter-all') : document.getElementById(`btn-letter-${letter}`);
            activeBtn.className = "shrink-0 px-3 py-1 rounded-lg text-sm font-medium transition-colors bg-pink-500 text-white shadow-sm";

            renderChars();
        }

        function filterByTag(tag) {
            currentTag = tag;
            const statusDiv = document.getElementById('filter-status');
            
            if (tag === "") {
                statusDiv.classList.add('hidden');
                statusDiv.classList.remove('flex');
            } else {
                statusDiv.classList.remove('hidden');
                statusDiv.classList.add('flex');
                document.getElementById('current-filter-tag').textContent = tag;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
            renderChars();
        }

        // 5. LOGIC ĐỔI CHẾ ĐỘ SÁNG / TỐI
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');

        function updateToggleBtn() {
            if (document.documentElement.classList.contains('dark')) {
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Chế độ Tối';
            } else {
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Chế độ Sáng';
            }
        }
        updateToggleBtn();

        themeToggleBtn.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            updateToggleBtn();
        });

        // Chạy khởi tạo ban đầu
        initFilters();
        renderChars();
    </script>
    <style>
        /* CSS ẩn thanh cuộn ngang của bảng chữ cái cho đẹp mắt */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
