<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Nhân Vật Của Tôi</title>
    <!-- Nhúng thư viện Tailwind CSS và FontAwesome để làm giao diện -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        // Tự động kiểm tra và giữ chế độ Dark Mode nếu đã bật trước đó
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<!-- Mặc định nền hồng nhạt, khi bật Dark Mode chuyển sang nền xám đen của ảnh watermarked_img_1741178076690525238.png -->
<body class="bg-pink-50 dark:bg-[#2d2d30] min-h-screen text-gray-800 dark:text-gray-200 font-sans p-6 transition-colors duration-300">

    <!-- NÚT CHUYỂN ĐỔI SÁNG / TỐI -->
    <div class="max-w-4xl mx-auto flex justify-end mb-6">
        <button id="theme-toggle" class="cursor-pointer bg-white dark:bg-gray-800 text-gray-700 dark:text-yellow-400 font-medium px-4 py-2 rounded-full shadow-sm border border-pink-100 dark:border-gray-700 hover:scale-105 transition-all text-sm flex items-center gap-2">
            <span id="theme-icon">☀️</span> <span id="theme-text">Chế độ Sáng</span>
        </button>
    </div>

    <!-- KHU VỰC CHỨA CÁC KHUNG NHÂN VẬT -->
    <!-- Dạng danh sách xếp chồng hàng dọc, giới hạn độ rộng tối đa để nhìn cân đối -->
    <main id="char-container" class="max-w-4xl mx-auto space-y-4 pb-16">
        <!-- JavaScript sẽ tự động đọc dữ liệu bên dưới và vẽ các khung vào đây -->
    </main>

    <footer class="text-center text-xs text-gray-400 dark:text-gray-500 my-10">
        © 2026 - Bản tối giản cho bạn
    </footer>

    <!-- ĐOẠN SCRIPT XỬ LÝ DỮ LIỆU VÀ GIAO DIỆN -->
    <script>
        // 1. NƠI BẠN QUẢN LÝ VÀ THÊM BỚT NHÂN VẬT
        // Muốn thêm nhân vật mới, bạn chỉ cần copy 1 cụm {...} rồi sửa thông tin bên trong.
        const charData = [
            {
                name: "Ashton Calloway",
                subText: "Hiện đại | FWB · yearning · off-campus inspired",
                ggaiLink: "https://link-ggai-cua-ashton.com",
                storyLink: "https://link-story-cua-ashton.com"
            },
            {
                name: "Khương Nghiên Lễ",
                subText: "Hiện đại | côn trùng real · em trai chị gái",
                ggaiLink: "https://link-ggai-cua-nghienle.com",
                storyLink: "https://link-story-cua-nghienle.com"
            },
            {
                name: "Khương Phi Đàm",
                subText: "Học đường | Academic rivals · vô sỉ · mặt dày",
                ggaiLink: "https://link-ggai-cua-phidam.com",
                storyLink: "https://link-story-cua-phidam.com"
            },
            {
                name: "Khương Viết Lâm",
                subText: "VN xưa | Hài · trinh thám · Nam Định",
                ggaiLink: "https://link-ggai-cua-vietlam.com",
                storyLink: "https://link-story-cua-vietlam.com"
            }
        ];

        // 2. HÀM TỰ ĐỘNG TẠO KHUNG ĐƯA LÊN GIAO DIỆN
        const container = document.getElementById('char-container');

        function renderChars() {
            container.innerHTML = ''; // Làm sạch vùng chứa
            
            charData.forEach(char => {
                // Tạo một khối div cho mỗi nhân vật
                const card = document.createElement('div');
                // CSS tạo bo góc, viền nhạt, khi bật dark mode sẽ đổi màu nền xám tối chuẩn như ảnh watermarked_img_1741178076690525238.png
                card.className = "bg-white dark:bg-[#1e1e1f] rounded-2xl border border-pink-100 dark:border-[#333334] p-5 shadow-sm flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 transition-all duration-200 hover:shadow-md";

                card.innerHTML = `
                    <!-- Bên trái: Tên nhân vật và các dòng chữ nhỏ kèm theo -->
                    <div class="space-y-1">
                        <h3 class="text-xl font-bold text-gray-800 dark:text-white">${char.name}</h3>
                        <p class="text-sm text-gray-500 dark:text-gray-400 font-medium">${char.subText}</p>
                    </div>
                    
                    <!-- Bên phải: 2 nút bấm riêng biệt -->
                    <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
                        <!-- Nút GGAI màu hồng đỏ nổi bật -->
                        <a href="${char.ggaiLink}" target="_blank" class="bg-[#db5a6b] text-white font-bold px-5 py-2.5 rounded-xl text-sm hover:opacity-90 transition flex items-center gap-1.5 justify-center w-1/2 sm:w-auto">
                            <i class="fa-solid fa-user-lock text-xs"></i> GGAI
                        </a>
                        <!-- Nút Story màu sáng/tối đồng bộ với nền -->
                        <a href="${char.storyLink}" target="_blank" class="bg-gray-50 dark:bg-[#2d2d30] text-gray-700 dark:text-gray-200 font-semibold px-5 py-2.5 rounded-xl text-sm border border-gray-200 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 transition flex items-center gap-1.5 justify-center w-1/2 sm:w-auto">
                            <i class="fa-solid fa-book-open text-xs"></i> Story
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 3. LOGIC ĐỔI CHẾ ĐỘ SÁNG / TỐI
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');

        function updateToggleBtn() {
            if (document.documentElement.classList.contains('dark')) {
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Chế độ Tối';
            } else {
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Chế độ Sáng';
            }
        }

        updateToggleBtn();

        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateToggleBtn();
        });

        // Kích hoạt vẽ giao diện
        renderChars();
    </script>
</body>
</html>
