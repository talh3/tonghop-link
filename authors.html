<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Tác Giả</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-pink-50 dark:bg-[#2d2d30] min-h-screen text-gray-800 dark:text-gray-200 font-sans p-6 transition-colors duration-300">

    <!-- Header & Nút Quay Lại -->
    <div class="max-w-4xl mx-auto flex justify-between items-center mb-8">
        <h1 class="text-2xl font-bold text-purple-600 dark:text-purple-400">
            <i class="fa-solid fa-feather-pointed mr-2"></i>Thư Viện Tác Giả
        </h1>
        
        <a href="index.html" class="cursor-pointer bg-white dark:bg-[#1e1e1f] text-gray-700 dark:text-gray-300 font-medium px-4 py-2 rounded-full shadow-sm border border-pink-100 dark:border-[#333334] hover:scale-105 transition-all text-sm flex items-center gap-2">
            <i class="fa-solid fa-arrow-left"></i> Trang chính
        </a>
    </div>

    <!-- DANH SÁCH CÁC TÁC GIẢ (Dạng danh sách dọc) -->
    <main class="max-w-4xl mx-auto flex flex-col gap-4 pb-16">

        <!-- TÁC GIẢ 1: GÀ -->
        <div class="bg-white dark:bg-[#1e1e1f] rounded-2xl border border-pink-100 dark:border-[#333334] p-5 shadow-sm flex flex-col sm:flex-row items-center justify-between gap-4 hover:-translate-y-1 hover:shadow-md transition-all duration-200">
            <h3 class="text-xl font-bold text-gray-800 dark:text-white">Gà</h3>
            
            <div class="flex items-center gap-3">
                <!-- Discord -->
                <a href="LINK_DISCORD_CUA_GA" target="_blank" class="w-10 h-10 rounded-full bg-[#5865F2] text-white flex items-center justify-center hover:opacity-80 transition-opacity" title="Discord">
                    <i class="fa-brands fa-discord"></i>
                </a>
                <!-- Facebook -->
                <a href="LINK_FB_CUA_GA" target="_blank" class="w-10 h-10 rounded-full bg-[#1877F2] text-white flex items-center justify-center hover:opacity-80 transition-opacity" title="Facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>
                <!-- Web -->
                <a href="LINK_WEB_CUA_GA" target="_blank" class="w-10 h-10 rounded-full bg-gray-600 dark:bg-gray-500 text-white flex items-center justify-center hover:opacity-80 transition-opacity" title="Website / Rentry">
                    <i class="fa-solid fa-globe"></i>
                </a>
            </div>
        </div>

        <!-- TÁC GIẢ 2: GIA NHI -->
        <div class="bg-white dark:bg-[#1e1e1f] rounded-2xl border border-pink-100 dark:border-[#333334] p-5 shadow-sm flex flex-col sm:flex-row items-center justify-between gap-4 hover:-translate-y-1 hover:shadow-md transition-all duration-200">
            <h3 class="text-xl font-bold text-gray-800 dark:text-white">Gia Nhi</h3>
            
            <div class="flex items-center gap-3">
                <a href="LINK_DISCORD_CUA_GIA_NHI" target="_blank" class="w-10 h-10 rounded-full bg-[#5865F2] text-white flex items-center justify-center hover:opacity-80 transition-opacity" title="Discord">
                    <i class="fa-brands fa-discord"></i>
                </a>
                <a href="LINK_FB_CUA_GIA_NHI" target="_blank" class="w-10 h-10 rounded-full bg-[#1877F2] text-white flex items-center justify-center hover:opacity-80 transition-opacity" title="Facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>
                <a href="LINK_WEB_CUA_GIA_NHI" target="_blank" class="w-10 h-10 rounded-full bg-gray-600 dark:bg-gray-500 text-white flex items-center justify-center hover:opacity-80 transition-opacity" title="Website / Rentry">
                    <i class="fa-solid fa-globe"></i>
                </a>
            </div>
        </div>

        <!-- TÁC GIẢ 3: JIANG YI -->
        <div class="bg-white dark:bg-[#1e1e1f] rounded-2xl border border-pink-100 dark:border-[#333334] p-5 shadow-sm flex flex-col sm:flex-row items-center justify-between gap-4 hover:-translate-y-1 hover:shadow-md transition-all duration-200">
            <h3 class="text-xl font-bold text-gray-800 dark:text-white">Jiang Yi</h3>
            
            <div class="flex items-center gap-3">
                <a href="LINK_DISCORD_CUA_JIANG_YI" target="_blank" class="w-10 h-10 rounded-full bg-[#5865F2] text-white flex items-center justify-center hover:opacity-80 transition-opacity" title="Discord">
                    <i class="fa-brands fa-discord"></i>
                </a>
                <a href="LINK_FB_CUA_JIANG_YI" target="_blank" class="w-10 h-10 rounded-full bg-[#1877F2] text-white flex items-center justify-center hover:opacity-80 transition-opacity" title="Facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>
                <a href="LINK_WEB_CUA_JIANG_YI" target="_blank" class="w-10 h-10 rounded-full bg-gray-600 dark:bg-gray-500 text-white flex items-center justify-center hover:opacity-80 transition-opacity" title="Website / Rentry">
                    <i class="fa-solid fa-globe"></i>
                </a>
            </div>
        </div>

    </main>

    <footer class="text-center text-xs text-gray-400 dark:text-gray-500 my-10">
        © 2026 - Mạng lưới Creator
    </footer>

</body>
</html>
